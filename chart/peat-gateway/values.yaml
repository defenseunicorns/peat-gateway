# peat-gateway Helm chart values

# -- Container image settings
image:
  repository: ghcr.io/defenseunicorns/peat-gateway
  tag: latest
  pullPolicy: IfNotPresent

# -- Number of replicas (use 1 with redb, >1 requires postgres)
replicaCount: 1

# -- Storage backend: "redb" (embedded, single-node) or "postgres"
storage:
  backend: redb
  postgres:
    # Connection string (ignored when backend=redb).
    # For production, use existingSecret instead of putting credentials here.
    url: ""
    # Use existing secret for connection string (key: url)
    existingSecret: ""

# -- Envelope encryption (KEK)
encryption:
  # Use existing secret containing the key-encryption-key
  existingSecret: ""
  # Key within the secret that holds the KEK value
  secretKey: peat-kek

# -- Persistent storage for redb database and Iroh state
persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessModes:
    - ReadWriteOnce

# -- CDC sink configuration
cdc:
  nats:
    # NATS server URL (empty = NATS sink disabled)
    url: ""
  kafka:
    # Kafka broker list (empty = Kafka sink disabled)
    brokers: ""

# -- Control-plane ingress configuration (peat-gateway#91; ADR-055 Amendment A+B).
# When `nats.url` is empty, the gateway does not subscribe to any control-plane
# subjects. When set, the gateway opens JetStream durable consumers per org
# under `{org}.*.ctl.>` (per-formation events) and the reserved `_org` sentinel
# app_id for org-level lifecycle events. The subscriber connection is
# gateway-initiated over the existing outbound NATS path — no separate
# NetworkPolicy ingress rule is required.
#
# IMPORTANT: handlers for peers / certificates / idp events are stubs in #91
# Step 4 (logged + acked, no state mutation) pending Phase-3 IDAM work in #99.
# Do not enable ingress for those use cases until #99 ships, or published
# events will be silently dropped. See docs/control-plane-ingress.md.
ingress:
  nats:
    # NATS server URL (empty = control-plane ingress disabled). Typically the
    # same broker the CDC sink publishes to; the gateway uses one underlying
    # connection.
    url: ""
    # JetStream stream name covering all per-org control-plane subjects.
    streamName: peat-gw-ctl
    # Per-org durable consumer name prefix; the actual consumer name is
    # `{consumerPrefix}-{org_id}`, stable across restarts so the cursor
    # replays cleanly.
    consumerPrefix: peat-gw

# -- Prometheus metrics
metrics:
  enabled: true
  port: 8080
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s

# -- Pod resource requests and limits
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# -- Pod scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# -- ServiceAccount
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- UDS Package CR
package:
  enabled: false
  serviceMeshMode: ""
  additionalNetworkAllow: []

# -- SSO configuration (requires UDS Core Keycloak)
sso:
  enabled: false
  issuerUri: "https://sso.uds.dev/realms/uds"
  clientId: uds-peat-gateway
  redirectUri: "https://peat.{{ .Values.domain }}/auth/callback"
