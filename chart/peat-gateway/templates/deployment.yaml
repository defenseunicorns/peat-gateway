apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "peat-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "peat-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "peat-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "peat-gateway.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "peat-gateway.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: peat-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PEAT_GATEWAY_BIND
              value: "0.0.0.0:8080"
            - name: PEAT_GATEWAY_DATA_DIR
              value: /data/peat-gateway
            - name: PEAT_STORAGE_BACKEND
              value: {{ .Values.storage.backend | quote }}
            {{- if eq .Values.storage.backend "postgres" }}
            {{- if .Values.storage.postgres.existingSecret }}
            - name: PEAT_STORAGE_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.postgres.existingSecret }}
                  key: url
            {{- else }}
            - name: PEAT_STORAGE_POSTGRES_URL
              value: {{ .Values.storage.postgres.url | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.cdc.nats.url }}
            - name: PEAT_CDC_NATS_URL
              value: {{ .Values.cdc.nats.url | quote }}
            {{- end }}
            {{- if .Values.cdc.kafka.brokers }}
            - name: PEAT_CDC_KAFKA_BROKERS
              value: {{ .Values.cdc.kafka.brokers | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: iroh-quic
              containerPort: 11204
              protocol: UDP
            - name: enrollment
              containerPort: 11205
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data/peat-gateway
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "peat-gateway.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
