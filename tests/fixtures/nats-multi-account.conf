# NATS server config for the broker-level account ACL test
# (peat-gateway#97). Defines three accounts:
#
#   DEFAULT       — the global / default account. Anonymous connections map
#              here via `no_auth_user: default`, with full permissions.
#              Existing test fixtures (sink, ingress, jetstream sanity,
#              dlq) all connect anonymously and continue to work
#              unchanged on this account.
#
#   ACME     — restricted account for tenant `acme`. Publish/subscribe
#              scoped to `acme.>`. A connection authenticated as
#              user=acme cannot publish into the `bravo.>` namespace —
#              the broker rejects with a Permissions Violation, which
#              is the broker-level ACL boundary the new test asserts.
#
#   BRAVO    — symmetric to ACME, scoped to `bravo.>`.
#
# This config is mounted into the CI's nats-integration broker so the
# new tests/nats_broker_acl_tests.rs runs against a broker that
# actually enforces these ACLs. Production deployments should mirror
# this account structure (one NATS account per gateway-managed org)
# per ADR-055 Amendment A's tenant-isolation guarantees.

listen: 0.0.0.0:4222

jetstream: {
    store_dir: "/tmp/peat-nats-jetstream"
}

accounts: {
    ACME: {
        jetstream: enabled
        users: [
            {
                user: acme
                password: acme-secret
                permissions: {
                    publish: { allow: ["acme.>"] }
                    subscribe: { allow: ["acme.>", "_INBOX.>"] }
                }
            }
        ]
    }
    BRAVO: {
        jetstream: enabled
        users: [
            {
                user: bravo
                password: bravo-secret
                permissions: {
                    publish: { allow: ["bravo.>"] }
                    subscribe: { allow: ["bravo.>", "_INBOX.>"] }
                }
            }
        ]
    }
    DEFAULT: {
        jetstream: enabled
        users: [
            {
                user: default
                password: default-secret
            }
        ]
    }
}

# Map anonymous connections (existing tests, gateway when run without
# credentials) to the default user in DEFAULT. Existing test behavior is
# unchanged — they still publish/subscribe wherever they always have.
no_auth_user: default
