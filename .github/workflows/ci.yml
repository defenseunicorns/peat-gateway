name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "kafka"
          - "postgres"
          - "aws-kms"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev pkg-config libssl-dev

      - name: Clippy (${{ matrix.features || 'default' }})
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo clippy -- -D warnings
          else
            cargo clippy --features "${{ matrix.features }}" -- -D warnings
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "kafka"
          - "postgres"
          - "aws-kms"
          - "vault"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev pkg-config libssl-dev

      - name: Test (${{ matrix.features || 'default' }})
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo test
          else
            cargo test --features "${{ matrix.features }}"
          fi

  nats-integration:
    name: NATS sink integration
    runs-on: ubuntu-latest
    # Run nats-server as a step rather than a service container so we can
    # pass `--jetstream`. GH Actions service containers don't support CMD
    # overrides — and JetStream is needed for the control-plane ingress
    # subscriber introduced in peat-gateway#91.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev pkg-config libssl-dev

      - name: Start NATS with JetStream + multi-account config
        # Pin to a specific nats-server version (peat-gateway#101) so a
        # major release that changes default behaviour or strict-validation
        # rules can't silently break this job — same exposure class as the
        # pnpm 11 surprise that took out publish on 2026-05-08 (#96). Bumps
        # are an explicit human-driven PR; the version here is updated
        # together with any local-dev guidance in docs/cdc.md.
        #
        # The broker is started with `tests/fixtures/nats-multi-account.conf`
        # (peat-gateway#97), which defines per-org ACME / BRAVO accounts
        # alongside the default $G account that anonymous connections fall
        # into. Existing tests connect anonymously → $G with full
        # permissions, behaviour unchanged. The new
        # tests/nats_broker_acl_tests.rs connects as user=acme and asserts
        # the broker rejects publishes outside acme's permitted subject
        # space — the broker-level tenant-isolation boundary ADR-055
        # Amendment A names as "primary".
        run: |
          docker run -d --name nats-test -p 4222:4222 \
            -v "$PWD/tests/fixtures/nats-multi-account.conf:/etc/nats.conf:ro" \
            nats:2.14.0 -c /etc/nats.conf --jetstream
          for i in $(seq 1 20); do
            if (echo > /dev/tcp/127.0.0.1/4222) 2>/dev/null; then
              echo "NATS reachable on 4222"
              exit 0
            fi
            sleep 0.5
          done
          echo "NATS did not become reachable" >&2
          docker logs nats-test || true
          exit 1

      - name: NATS sink tests
        run: cargo test --features nats --test nats_sink_tests --test nats_jetstream_tests --test nats_ingress_tests --test nats_broker_acl_tests
        env:
          NATS_URL: nats://localhost:4222
          # Test-only credentials matching tests/fixtures/nats-multi-account.conf
          # (a public file in this repo — values are not real secrets).
          # Sourced from env to keep the test file free of password
          # literals (CodeQL hard-coded-credentials rule).
          PEAT_NATS_ACME_TEST_PASSWORD: acme-secret
          PEAT_NATS_BRAVO_TEST_PASSWORD: bravo-secret

      - name: Stop NATS
        if: always()
        run: docker stop nats-test || true

  feature-matrix:
    name: Feature builds
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "nats"
          - "kafka"
          - "webhook"
          - "oidc"
          - "full"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev pkg-config libssl-dev

      - name: Build (${{ matrix.features || 'default' }})
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build
          else
            cargo build --features "${{ matrix.features }}"
          fi

  audit:
    name: Security Audit
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo generate-lockfile
      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet
      - name: Run audit (fail on vulnerabilities, warn on unmaintained)
        # cargo-audit's only config-file path is ~/.cargo/audit.toml (outside
        # the repo). Inline `--ignore` flags here are the canonical mechanism
        # for workspace-tracked exceptions. Each entry below should be
        # revisited when upstream ships a fix reachable from our dep tree.
        #
        # RUSTSEC-2026-0118 — hickory-proto NSEC3 closest-encloser unbounded
        # loop. Fix moved to hickory-net 0.26.x; reachable only from DNSSEC
        # validation paths peat-gateway does not enable. Pulled transitively
        # via iroh (through peat-mesh). Drop when iroh stops shipping
        # hickory-proto 0.25.x.
        #
        # RUSTSEC-2026-0119 — hickory-proto O(n²) name-compression DoS. Fixed
        # in hickory-proto 0.26.1. Pulled transitively via iroh (through
        # peat-mesh). Drop when iroh updates to hickory-proto >=0.26.1.
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0118 \
            --ignore RUSTSEC-2026-0119 \
            2>&1 || true
          cargo audit \
            --ignore RUSTSEC-2026-0118 \
            --ignore RUSTSEC-2026-0119 \
            --json 2>/dev/null | jq -e '.vulnerabilities.count == 0'
